<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Result - NetVerity AI</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="test-container">

  <div class="logo-header" style="justify-content: center; margin-bottom: 30px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00ffa3" stroke-width="2" style="margin-right: 10px;">
      <circle cx="12" cy="12" r="10"></circle>
      <circle cx="12" cy="12" r="4"></circle>
    </svg>
    <h2>NetVerity <span class="text-green">AI</span></h2>
  </div>

  <h1 style="font-size: 32px; margin-bottom: 30px; font-weight: 800; letter-spacing: -1px;">Scan <span class="text-green">Complete</span></h1>

  <div class="stats-card" id="result" style="flex-direction: column; text-align: left; background: linear-gradient(145deg, var(--card-bg), #0f1522); border: 1px solid var(--primary-green-dim);">
    <h2 id="score" style="font-size: 28px; margin-bottom: 20px; color: var(--text-main);">Score: --</h2>

    <div class="bar">
      <div class="fill" id="barFill" style="width: 0%;"></div> 
    </div>

    <p id="status" style="font-size: 16px; color: var(--primary-green); font-weight: 600; margin-top: 15px;"></p>
    <p id="recommendation" style="font-size: 14px; color: var(--text-muted); margin-top: 8px; line-height: 1.5;"></p>
  </div>

  <a href="test.html" style="text-decoration: none; display: inline-block; margin-top: 20px;">
    <button class="btn-outline-glow">Test Again</button>
  </a>

</div>

<script src="../js/app.js"></script>

</body>
</html>
